<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tally">
<meta name="theme-color" content="#1a1916">
<title>Tally — Task Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0e0c; --surface: #1a1916; --surface2: #23211e; --surface3: #2d2a26;
    --border: #38342e; --accent: #e8c547; --accent2: #c9955a; --accent3: #7ab8a0;
    --text: #f0ece4; --text2: #a09880; --text3: #5c5648; --danger: #c96b5a;
    --small-reward: #c9955a; --big-reward: #9b7ec8;
    --radius: 6px;
    --font: Georgia, 'Times New Roman', 'Palatino Linotype', serif;
  }
  *, input, select, button, textarea { font-family: var(--font); }
  body { background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

  /* ── SYNC STATUS BAR ── */
  #sync-bar { position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 9999; background: transparent; transition: background 0.3s; }
  #sync-bar.syncing { background: linear-gradient(90deg, var(--accent3), var(--accent), var(--accent3)); background-size: 200% 100%; animation: syncpulse 1.2s infinite; }
  #sync-bar.error { background: var(--danger); }
  @keyframes syncpulse { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }

  /* ── HEADER ── */
  header { padding: 13px 18px 11px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--surface); position: sticky; top: 0; z-index: 100; margin-top: 2px; }
  .app-title { font-size: 22px; color: var(--accent); font-style: italic; }
  .app-title span { color: var(--text2); font-style: normal; font-size: 13px; margin-left: 6px; }
  .header-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
  .sync-indicator { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; font-style: italic; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.live { background: var(--accent3); }
  .sync-dot.syncing { background: var(--accent); animation: blink 0.8s infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── LAYOUT ── */
  .layout { display: flex; height: calc(100vh - 57px); height: calc(100dvh - 57px); overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar { width: 220px; min-width: 160px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 10px 14px 8px; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .sidebar-section-label { padding: 10px 14px 4px; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); }
  .sidebar-divider { height: 1px; background: var(--border); margin: 6px 0; }
  .cat-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text2); border-left: 2px solid transparent; transition: all 0.15s; user-select: none; }
  .cat-item:hover { background: var(--surface2); color: var(--text); }
  .cat-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cat-count { font-size: 10px; background: var(--surface3); padding: 1px 5px; border-radius: 8px; color: var(--text3); flex-shrink: 0; font-family: monospace; }
  .cat-chev { font-size: 9px; color: var(--text3); flex-shrink: 0; transition: transform 0.15s; }
  .cat-chev.open { transform: rotate(90deg); }
  .folder-item { padding: 6px 14px 6px 32px; cursor: pointer; display: flex; align-items: center; gap: 6px; color: var(--text3); border-left: 2px solid transparent; transition: all 0.15s; user-select: none; font-size: 12px; }
  .folder-item:hover { background: var(--surface2); color: var(--text2); }
  .folder-item.active { color: var(--accent2); border-left-color: var(--accent2); background: var(--surface2); }
  .folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .folder-count { font-size: 9px; background: var(--surface3); padding: 1px 4px; border-radius: 6px; font-family: monospace; }
  .rewards-sidebar-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text2); border-left: 2px solid transparent; transition: all 0.15s; user-select: none; font-size: 13px; }
  .rewards-sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .rewards-sidebar-item.active { border-left-color: var(--big-reward); color: var(--big-reward); background: var(--surface2); }

  /* ── MAIN ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .main-header { padding: 12px 18px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--surface); flex-wrap: wrap; }
  .breadcrumb { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
  .breadcrumb span { cursor: pointer; color: var(--text2); } .breadcrumb span:hover { color: var(--accent); }
  .main-title { font-size: 19px; flex: 1; min-width: 80px; font-style: italic; }
  .task-list { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }

  /* ── TASK CARD ── */
  .task-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.15s; }
  .task-card:hover { border-color: var(--surface3); }
  .task-card.done { opacity: 0.5; }
  .task-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 10px 12px 12px; }
  .task-check { width: 18px; height: 18px; flex-shrink: 0; border: 1.5px solid var(--border); border-radius: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; transition: all 0.15s; }
  .task-check:hover { border-color: var(--accent); }
  .task-check.checked { background: var(--accent); border-color: var(--accent); }
  .task-check.checked::after { content: '✓'; font-size: 11px; color: var(--bg); font-weight: bold; }
  .task-body { flex: 1; min-width: 0; overflow: hidden; }
  .task-name { font-size: 14px; color: var(--text); line-height: 1.55; word-break: break-word; overflow-wrap: break-word; }
  .task-card.done .task-name { text-decoration: line-through; color: var(--text3); }
  .task-meta { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; align-items: center; row-gap: 3px; }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--text2); white-space: nowrap; font-family: monospace; }
  .tag.deadline { border-color: var(--accent2); color: var(--accent2); }
  .tag.time { border-color: var(--accent3); color: var(--accent3); }
  .tag.overdue { border-color: var(--danger); color: var(--danger); }
  .task-actions { display: flex; gap: 0; flex-shrink: 0; align-self: flex-start; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px 6px; border-radius: 3px; font-size: 13px; line-height: 1; transition: all 0.1s; }
  .icon-btn:hover { color: var(--text); background: var(--surface2); }
  .icon-btn.danger:hover { color: var(--danger); }

  /* ── SUBTASKS ── */
  .subtask-section { border-top: 1px solid var(--border); padding: 8px 12px 10px 40px; }
  .subtask-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .subtask-name { flex: 1; font-size: 13px; color: var(--text2); }
  .subtask-name.done { text-decoration: line-through; color: var(--text3); }
  .subtask-check { width: 13px; height: 13px; flex-shrink: 0; border: 1px solid var(--border); border-radius: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .subtask-check:hover { border-color: var(--accent); }
  .subtask-check.checked { background: var(--accent3); border-color: var(--accent3); }
  .subtask-check.checked::after { content: '✓'; font-size: 9px; color: var(--bg); font-weight: bold; }
  .add-subtask-row { display: flex; gap: 6px; margin-top: 6px; }
  .subtask-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 5px 8px; color: var(--text); font-size: 12px; outline: none; }
  .subtask-input:focus { border-color: var(--accent3); }

  /* ── TIME BAR ── */
  .time-bar { border-top: 1px solid var(--border); padding: 8px 12px 10px 40px; }
  .time-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .time-field { display: flex; flex-direction: column; gap: 3px; }
  .time-label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); }
  .time-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 5px 8px; color: var(--text); font-family: monospace; font-size: 12px; outline: none; width: 90px; }
  .time-input:focus { border-color: var(--accent); }
  .time-calc { font-size: 11px; color: var(--accent3); padding: 4px 8px; background: var(--surface2); border-radius: 3px; border: 1px solid var(--border); }

  /* ── ADD TASK BAR ── */
  .add-task-bar { border-top: 1px solid var(--border); padding: 10px 18px; background: var(--surface); display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 3px; }
  .form-label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); }
  .form-input, .form-select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; color: var(--text); font-size: 13px; outline: none; transition: border-color 0.15s; }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-input.wide { width: 200px; } .form-input.narrow { width: 108px; }
  .form-select { cursor: pointer; } option { background: var(--surface2); }
  .format-toolbar { display: flex; gap: 3px; align-items: center; padding: 3px 5px; background: var(--surface3); border: 1px solid var(--border); border-radius: 4px; }
  .fmt-btn { background: none; border: none; cursor: pointer; color: var(--text2); padding: 3px 8px; border-radius: 3px; font-size: 13px; line-height: 1; transition: all 0.1s; }
  .fmt-btn:hover { background: var(--surface2); color: var(--text); }
  .fmt-btn.active { background: var(--accent); color: var(--bg); }
  .fmt-sep { width: 1px; height: 14px; background: var(--border); margin: 0 2px; }
  .rich-input { flex: 1; min-width: 160px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; color: var(--text); font-size: 13px; outline: none; min-height: 34px; max-height: 80px; overflow-y: auto; transition: border-color 0.15s; line-height: 1.5; }
  .rich-input:focus { border-color: var(--accent); }
  .rich-input:empty::before { content: attr(data-placeholder); color: var(--text3); pointer-events: none; }
  .input-wrap { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 180px; }

  /* ── BUTTONS ── */
  .btn { padding: 7px 14px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: var(--bg); font-style: italic; }
  .btn-primary:hover { background: #f0d060; }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { color: var(--text); border-color: var(--text3); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-danger { background: var(--surface2); color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: var(--text); }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 22px; width: 420px; max-width: 94vw; transform: translateY(10px); transition: transform 0.2s; max-height: 88vh; overflow-y: auto; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-size: 20px; margin-bottom: 16px; color: var(--accent); font-style: italic; }
  .modal-fields { display: flex; flex-direction: column; gap: 13px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; align-items: center; }
  .color-grid { display: flex; flex-wrap: wrap; gap: 7px; }
  .color-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.12s; flex-shrink: 0; }
  .color-opt.selected { border-color: var(--text); transform: scale(1.18); }

  /* ── PROGRESS ── */
  .progress-bar-wrap { height: 2px; background: var(--border); border-radius: 1px; margin-top: 5px; }
  .progress-bar { height: 2px; border-radius: 1px; transition: width 0.3s; }
  .progress-text { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* ── REWARDS ── */
  .rewards-view { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 20px; }
  .toggle-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text2); }
  .toggle-switch { position: relative; width: 38px; height: 20px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; background: var(--surface3); border-radius: 20px; cursor: pointer; transition: background 0.2s; border: 1px solid var(--border); }
  .toggle-track::after { content: ''; position: absolute; left: 3px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; background: var(--text3); border-radius: 50%; transition: all 0.2s; }
  .toggle-switch input:checked + .toggle-track { background: var(--big-reward); border-color: var(--big-reward); }
  .toggle-switch input:checked + .toggle-track::after { left: 21px; background: var(--text); }
  .reward-tier { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .reward-tier-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .reward-tier-header.small { background: rgba(201,149,90,0.07); }
  .reward-tier-header.big { background: rgba(155,126,200,0.07); }
  .reward-tier-name { font-size: 15px; font-style: italic; }
  .reward-tier-name.small { color: var(--small-reward); }
  .reward-tier-name.big { color: var(--big-reward); }
  .reward-tier-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .reward-list { padding: 8px 0; }
  .reward-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid var(--border); }
  .reward-item:last-child { border-bottom: none; }
  .reward-item-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
  .reward-item-body { flex: 1; min-width: 0; }
  .reward-item-name { font-size: 13px; color: var(--text); line-height: 1.4; }
  .reward-item-note { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .reward-item-actions { display: flex; gap: 3px; flex-shrink: 0; }
  .reward-earned { opacity: 0.45; }
  .reward-earned .reward-item-name { text-decoration: line-through; }
  .reward-add-row { display: flex; gap: 8px; padding: 10px 16px; background: var(--surface2); align-items: flex-end; flex-wrap: wrap; }
  .reward-add-input { flex: 1; min-width: 130px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; color: var(--text); font-size: 13px; outline: none; }
  .reward-add-input:focus { border-color: var(--accent); }
  .milestones-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .milestones-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: rgba(232,197,71,0.05); }
  .milestones-title { font-size: 15px; font-style: italic; color: var(--accent); flex: 1; }
  .milestone-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .milestone-row:last-child { border-bottom: none; }
  .milestone-count-badge { font-size: 13px; color: var(--accent); font-style: italic; min-width: 36px; }
  .milestone-reward-select { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 5px 8px; color: var(--text); font-size: 12px; outline: none; cursor: pointer; }
  .milestone-type { font-size: 10px; padding: 2px 7px; border-radius: 10px; }
  .milestone-type.small { background: rgba(201,149,90,0.15); color: var(--small-reward); border: 1px solid rgba(201,149,90,0.3); }
  .milestone-type.big { background: rgba(155,126,200,0.15); color: var(--big-reward); border: 1px solid rgba(155,126,200,0.3); }
  .milestone-achieved { opacity: 0.45; }
  .add-milestone-row { display: flex; gap: 8px; padding: 10px 16px; background: var(--surface2); align-items: center; flex-wrap: wrap; }
  .task-counter-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .task-counter-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .task-counter-num { font-size: 32px; color: var(--accent); font-style: italic; line-height: 1; }
  .next-milestone-info { margin-top: 8px; font-size: 12px; color: var(--text2); }
  .next-milestone-info span { color: var(--accent); font-style: italic; }

  /* ── CELEBRATION ── */
  .celebration { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
  .celebration.show { opacity: 1; pointer-events: all; }
  .celebration-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px 36px; text-align: center; max-width: 340px; width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.7); transform: scale(0.9); transition: transform 0.3s; }
  .celebration.show .celebration-card { transform: scale(1); }
  .celebration-emoji { font-size: 48px; margin-bottom: 12px; display: block; }
  .celebration-title { font-size: 22px; color: var(--accent); font-style: italic; margin-bottom: 6px; }
  .celebration-reward-type { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; }
  .celebration-reward-type.small { color: var(--small-reward); }
  .celebration-reward-type.big { color: var(--big-reward); }
  .celebration-reward-name { font-size: 17px; color: var(--text); margin-bottom: 20px; line-height: 1.4; }
  .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1999; }

  /* ── LOADING SCREEN ── */
  #loading-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity 0.4s; }
  #loading-screen.fade { opacity: 0; pointer-events: none; }
  .loading-title { font-size: 28px; color: var(--accent); font-style: italic; }
  .loading-sub { font-size: 13px; color: var(--text3); }
  .loading-spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LOGIN SCREEN ── */
  #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4999; display: none; flex-direction: column; align-items: center; justify-content: center; }
  #login-screen.show { display: flex; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px 40px; text-align: center; max-width: 360px; width: 90vw; display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .login-title { font-size: 28px; color: var(--accent); font-style: italic; }
  .login-sub { font-size: 13px; color: var(--text3); line-height: 1.7; }
  .btn-github { display: flex; align-items: center; gap: 10px; background: #24292e; color: #fff; border: 1px solid #1b1f23; border-radius: 4px; padding: 10px 20px; font-size: 14px; cursor: pointer; font-family: var(--font); transition: background 0.15s; }
  .btn-github:hover { background: #2f363d; }
  .login-error { font-size: 12px; color: var(--danger); min-height: 16px; }

  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  .empty { padding: 40px; text-align: center; color: var(--text3); font-size: 13px; line-height: 1.9; }
  .empty strong { display: block; font-size: 22px; color: var(--text2); margin-bottom: 6px; font-style: italic; }
  .recategorize-btn { font-size: 10px; color: var(--accent2); background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; margin-left: 3px; }

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, onSnapshot, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, GithubAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyDSXmRQXsuQaNqD81ksb_8d1QHSNcMxuZU",
  authDomain: "tally-7570b.firebaseapp.com",
  projectId: "tally-7570b",
  storageBucket: "tally-7570b.firebasestorage.app",
  messagingSenderId: "917720855291",
  appId: "1:917720855291:web:b645ba258f221386d6b65e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GithubAuthProvider();

// ── SYNC STATUS ──
function setSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  const bar = document.getElementById('sync-bar');
  if (!dot) return;
  dot.className = 'sync-dot ' + (status === 'live' ? 'live' : status === 'syncing' ? 'syncing' : status === 'error' ? 'error' : '');
  label.textContent = status === 'live' ? 'synced ✓' : status === 'syncing' ? 'saving…' : status === 'error' ? 'offline' : 'connecting…';
  bar.className = status === 'syncing' ? 'syncing' : status === 'error' ? 'error' : '';
}

function hideLoading() {
  const ls = document.getElementById('loading-screen');
  if (ls) { ls.classList.add('fade'); setTimeout(() => ls.remove(), 500); }
  window.render();
}

// ── FIRESTORE LISTENER (set up per user) ──
let unsubscribeFirestore = null;
let saveTimer = null;

function initUserData(user) {
  // Per-user document: users/{uid}/appstate
  const STATE_DOC = doc(db, 'users', user.uid);

  window.fbSave = function(immediate) {
    setSyncStatus('syncing');
    clearTimeout(saveTimer);
    const delay = immediate ? 0 : 600;
    saveTimer = setTimeout(async () => {
      try {
        await setDoc(STATE_DOC, {
          categories: window._categories,
          folders: window._folders,
          tasks: window._tasks,
          rewards: window._rewards,
          activeView: window._activeView,
          nextId: window._nextId,
          progress: window._progress,
          updatedAt: Date.now()
        });
        setSyncStatus('live');
      } catch(e) {
        console.error('Save failed:', e);
        setSyncStatus('error');
      }
    }, delay);
  };

  let firstLoad = true;
  unsubscribeFirestore = onSnapshot(STATE_DOC, (snap) => {
    if (!snap.exists()) {
      hideLoading();
      window.fbSave(true);
      return;
    }
    const d = snap.data();
    if (d.categories) window._categories = d.categories;
    if (d.folders)    window._folders    = d.folders;
    if (d.tasks)      window._tasks      = d.tasks;
    if (d.rewards)    window._rewards    = d.rewards;
    if (d.activeView) window._activeView = d.activeView;
    if (d.nextId)     window._nextId     = d.nextId;
    if (d.progress)   window._progress   = d.progress;
    setSyncStatus('live');
    if (firstLoad) {
      firstLoad = false;
      hideLoading();
    } else {
      window.render();
    }
  }, (err) => {
    console.error('Firestore listener error:', err);
    setSyncStatus('error');
    hideLoading();
  });
}

// ── AUTH STATE ──
onAuthStateChanged(auth, (user) => {
  const loginScreen = document.getElementById('login-screen');
  const signOutBtn = document.getElementById('btn-sign-out');

  if (!user) {
    // Not signed in — show login screen
    if (unsubscribeFirestore) { unsubscribeFirestore(); unsubscribeFirestore = null; }
    clearTimeout(saveTimer);
    const ls = document.getElementById('loading-screen');
    if (ls) ls.remove();
    if (loginScreen) loginScreen.classList.add('show');
    if (signOutBtn) signOutBtn.style.display = 'none';
    return;
  }

  // Signed in — hide login, start app
  if (loginScreen) loginScreen.classList.remove('show');
  if (signOutBtn) signOutBtn.style.display = '';
  initUserData(user);
});

// ── SIGN IN / OUT (exposed for HTML onclick) ──
window.fbSignIn = async function() {
  const errEl = document.getElementById('login-error');
  try {
    if (errEl) errEl.textContent = '';
    await signInWithPopup(auth, provider);
  } catch(e) {
    console.error('Sign in failed:', e);
    if (errEl) errEl.textContent = 'Sign in failed. Please try again.';
  }
};

window.fbSignOut = async function() {
  if (unsubscribeFirestore) { unsubscribeFirestore(); unsubscribeFirestore = null; }
  clearTimeout(saveTimer);
  await signOut(auth);
};

</script>

// Shorthand references

function F(){return window._folders;}

function NI(){return window._nextId++;}

let currentPanel='tasks';

function sched(){if(window.fbSave)window.fbSave(false);}

// ── MOBILE ──

// ── SIDEBAR ──
function renderSidebar(){
  const el=document.getElementById('sidebar-list');
  el.innerHTML='';
  const tasksLabel=document.createElement('div');tasksLabel.className='sidebar-section-label';tasksLabel.textContent='Tasks';el.appendChild(tasksLabel);
  C().forEach(cat=>{
    const cf=F().filter(f=>f.catId===cat.id);

    if(cat.open)cf.forEach(f=>{
      const fc=T().filter(t=>t.folderId===f.id&&!t.done).length;
      const fa=currentPanel==='tasks'&&AV().catId===cat.id&&AV().folderId===f.id;
      const fr=document.createElement('div');
      fr.className='folder-item'+(fa?' active':'');
      fr.innerHTML=`<span style="font-size:11px">📁</span><span class="folder-name">${esc(f.name)}</span>${fc?`<span class="folder-count">${fc}</span>`:''}`;

  const div2=document.createElement('div');div2.className='sidebar-divider';el.appendChild(div2);
  const rewLabel=document.createElement('div');rewLabel.className='sidebar-section-label';rewLabel.textContent='Rewards';el.appendChild(rewLabel);

// ── MAIN ──
function renderMain(){

  const folder=AV().folderId?F().find(f=>f.id===AV().folderId):null;
  document.getElementById('breadcrumb').innerHTML=folder&&cat?`<span onclick="setAV({catId:'${cat.id}',folderId:null});render();sched()">${esc(cat.name)}</span> <span style="color:var(--text3)">›</span> <span style="color:var(--text2)">${esc(folder.name)}</span>`:'';
  document.getElementById('main-title').textContent=folder?folder.name:(cat?cat.name:'Tasks');
  const filtered=T().filter(t=>t.catId===AV().catId&&(AV().folderId?t.folderId===AV().folderId:true));
  const done=filtered.filter(t=>t.done).length,total=filtered.length;
  const pw=document.getElementById('progress-wrap');
  if(total){const pct=Math.round(done/total*100),col=folder?folder.color:(cat?cat.color:'#888');pw.innerHTML=`<div class="progress-bar-wrap" style="width:130px"><div class="progress-bar" style="width:${pct}%;background:${col}"></div></div><div class="progress-text">${done}/${total} complete</div>`;}else pw.innerHTML='';
  const el=document.getElementById('task-list');
  if(!filtered.length){el.innerHTML=`<div class="empty"><strong>Nothing here yet.</strong>Add a task below to get started.</div>`;renderCatSelect();return;}
  el.innerHTML='';
  if(!AV().folderId){
    T().filter(t=>t.catId===AV().catId&&!t.folderId).forEach(t=>el.appendChild(buildCard(t)));
    F().filter(f=>f.catId===AV().catId).forEach(f=>{
      const ft=T().filter(t=>t.catId===AV().catId&&t.folderId===f.id);
      if(!ft.length)return;
      const h=document.createElement('div');h.className='folder-header';
      h.innerHTML=`<span>📁</span><span class="folder-header-title" style="color:${f.color}">${esc(f.name)}</span><span style="font-size:10px;color:var(--text3);margin-left:4px">${ft.length} task${ft.length!==1?'s':''}</span>`;
      el.appendChild(h);const sep=document.createElement('div');sep.className='section-sep';el.appendChild(sep);
      ft.forEach(t=>el.appendChild(buildCard(t)));
    });
  }else filtered.forEach(t=>el.appendChild(buildCard(t)));
  renderCatSelect();
}

function buildCard(task){
  const cat=C().find(c=>c.id===task.catId);
  const folder=task.folderId?F().find(f=>f.id===task.folderId):null;
  const acc=folder?folder.color:(cat?cat.color:'#38342e');
  const card=document.createElement('div');
  card.className='task-card'+(task.done?' done':'')+(task.important?' important':'');
  card.style.borderLeftColor=acc;
  let tags='';
  if(task.deadline){const d=new Date(task.deadline),diff=d-new Date();tags+=`<span class="tag ${!task.done&&diff<0?'overdue':'deadline'}">⏰ ${fmtDL(d)}</span>`;if(!task.done&&task.estHours){const h=diff/3600000;tags+=`<span class="tag time">~${task.estHours}h · ${h>0?Math.round(task.estHours/h*100):100}% of time</span>`;}}
  else if(task.timeframe){tags+=`<span class="tag deadline">📅 ${esc(task.timeframe)}</span>`;if(task.estHours)tags+=`<span class="tag time">~${task.estHours}h est</span>`;}
  else if(task.estHours)tags+=`<span class="tag time">~${task.estHours}h est</span>`;
  if(task.actualHours!==''&&task.actualHours!==null&&task.actualHours!==undefined)tags+=`<span class="tag time">✓ ${task.actualHours}h actual</span>`;
  if(task.important)tags+=`<span class="tag important">★ Important</span>`;
  if(task.catId==='general')tags+=`<button class="recategorize-btn" onclick="openRecategorize('${task.id}')">re-categorize</button>`;
  const sd=task.subtasks.filter(s=>s.done).length;
  card.innerHTML=`<div class="task-row">
    <div class="task-check ${task.done?'checked':''}" onclick="toggleTask('${task.id}')"></div>
    <div class="task-body">
      <div class="task-name">${task.nameHtml||esc(task.name||'')}</div>
      <div class="task-meta">${tags}</div>
      ${task.subtasks.length?`<div class="progress-text" style="margin-top:3px">${sd}/${task.subtasks.length} subtasks</div>`:''}
    </div>
    <div class="task-actions">
      <button class="star-btn ${task.important?'starred':''}" onclick="toggleImportant('${task.id}')" title="Toggle important">${task.important?'★':'☆'}</button>
      <button class="icon-btn" onclick="toggleExpand('${task.id}')">${task.expanded?'▲':'▼'}</button>
      <button class="icon-btn" onclick="openEditTask('${task.id}')">✎</button>
      <button class="icon-btn danger" onclick="deleteTask('${task.id}')">✕</button>
    </div>
  </div>`;
  if(task.expanded){
    const sub=document.createElement('div');sub.className='subtask-section';
    task.subtasks.forEach(s=>{const r=document.createElement('div');r.className='subtask-row';r.innerHTML=`<div class="subtask-check ${s.done?'checked':''}" onclick="toggleSub('${task.id}','${s.id}')"></div><div class="subtask-name ${s.done?'done':''}">${esc(s.name)}</div><button class="icon-btn danger" style="font-size:11px" onclick="deleteSub('${task.id}','${s.id}')">✕</button>`;sub.appendChild(r);});
    const ar=document.createElement('div');ar.className='add-subtask-row';ar.innerHTML=`<input class="subtask-input" id="sub-${task.id}" placeholder="Add subtask…" onkeydown="if(event.key==='Enter')addSub('${task.id}')"><button class="btn btn-secondary btn-sm" onclick="addSub('${task.id}')">+</button>`;sub.appendChild(ar);card.appendChild(sub);
    const tb=document.createElement('div');tb.className='time-bar';
    let calc='';
    if(task.deadline&&task.estHours){const diff=new Date(task.deadline)-new Date();calc=diff>0?`<div class="time-calc">📊 ${(diff/86400000).toFixed(1)}d left · ${(task.estHours/(diff/86400000)).toFixed(1)}h/day needed</div>`:`<div class="time-calc" style="color:var(--danger)">⚠ Deadline passed</div>`;}
    tb.innerHTML=`<div class="time-row"><div class="time-field"><div class="time-label">Est. hours</div><input class="time-input" type="number" min="0" step="0.5" value="${task.estHours||''}" placeholder="0" onchange="updField('${task.id}','estHours',this.value)"></div><div class="time-field"><div class="time-label">Actual hours</div><input class="time-input" type="number" min="0" step="0.5" value="${task.actualHours!==''?task.actualHours:''}" placeholder="0" onchange="updField('${task.id}','actualHours',this.value)"></div>${calc}</div>`;
    card.appendChild(tb);
  }
  return card;
}

function addReward(tier){const ne=document.getElementById(`new-${tier}-name`),ee=document.getElementById(`new-${tier}-emoji`);const n=ne?.value.trim();if(!n)return;const e=ee?.value.trim()||(tier==='small'?'⭐':'🏆');R()[tier].push({id:'r'+NI(),name:n,emoji:e,earned:false});ne.value='';ee.value='';sched();renderRewards();}
function deleteReward(id){window._rewards.small=R().small.filter(r=>r.id!==id);window._rewards.big=R().big.filter(r=>r.id!==id);R().milestones.forEach(m=>{if(m.rewardId===id)m.rewardId='';});sched();renderRewards();}
function earnReward(id){const all=[...R().small,...R().big];const r=all.find(r=>r.id===id);if(r)r.earned=true;sched();renderRewards();}
function openEditReward(id){
  const all=[...R().small,...R().big];const r=all.find(r=>r.id===id);if(!r)return;
  const mc=document.getElementById('modal-content');document.getElementById('modal-overlay').classList.add('open');
  mc.innerHTML=`<div class="modal-title">Edit Reward</div><div class="modal-fields"><div class="form-group"><div class="form-label">Emoji</div><input class="form-input" id="m-emoji" value="${escA(r.emoji||'')}" style="width:70px;text-align:center"></div><div class="form-group"><div class="form-label">Name</div><input class="form-input" id="m-name" value="${escA(r.name)}" style="width:100%"></div><div class="form-group"><label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer"><input type="checkbox" id="m-earned" ${r.earned?'checked':''} style="width:14px;height:14px"> Marked as earned</label></div></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveReward('${id}')">Save</button></div>`;
}
function saveReward(id){const all=[...R().small,...R().big];const r=all.find(r=>r.id===id);if(r){r.name=document.getElementById('m-name')?.value.trim()||r.name;r.emoji=document.getElementById('m-emoji')?.value.trim()||r.emoji;r.earned=document.getElementById('m-earned')?.checked||false;}closeModal();sched();renderRewards();}
function addMilestone(){const c=parseInt(document.getElementById('new-ms-count')?.value)||0;const rid=document.getElementById('new-ms-reward')?.value||'';if(c<1)return;R().milestones.push({id:'m'+NI(),count:c,rewardId:rid,achieved:false});sched();renderRewards();}
function deleteMilestone(id){window._rewards.milestones=R().milestones.filter(m=>m.id!==id);sched();renderRewards();}
function updateMilestoneReward(mid,rid){const m=R().milestones.find(m=>m.id===mid);if(m)m.rewardId=rid;sched();}

function checkMilestones(prev,next){
  if(!R().enabled)return;
  const toFire=R().milestones.filter(m=>!m.achieved&&m.count>prev&&m.count<=next);
  if(!toFire.length)return;
  const m=toFire[0];m.achieved=true;sched();
  const all=[...R().small,...R().big];
  const r=m.rewardId?all.find(r=>r.id===m.rewardId):null;
  const isS=r?R().small.some(rr=>rr.id===r.id):false;
  showCelebration(m.count,r,isS);
}

// ── CELEBRATION ──
function showCelebration(count,reward,isSmall){

  document.getElementById('cel-emoji').textContent=reward?reward.emoji:(isSmall?'⭐':'🏆');

  ov.classList.add('show');launchConfetti();
}
function closeCelebration(){document.getElementById('celebration').classList.remove('show');stopConfetti();}
let confettiAnim=null;
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas'),ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#e8c547','#c9955a','#7ab8a0','#9b7ec8','#e87ca0','#5a8ec9','#f0ece4'];
  let pts=Array.from({length:80},()=>({x:Math.random()*canvas.width,y:-10,vx:(Math.random()-.5)*4,vy:Math.random()*3+2,color:colors[Math.floor(Math.random()*colors.length)],size:Math.random()*8+4,rot:Math.random()*360,rotV:(Math.random()-.5)*6}));
  function frame(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);ctx.restore();});pts=pts.filter(p=>p.y<canvas.height+20);if(pts.length)confettiAnim=requestAnimationFrame(frame);}
  cancelAnimationFrame(confettiAnim);frame();
}
function stopConfetti(){cancelAnimationFrame(confettiAnim);const c=document.getElementById('confetti-canvas');c.getContext('2d').clearRect(0,0,c.width,c.height);}

// ── SELECTS ──
function renderCatSelect(){const s=document.getElementById('new-task-cat');if(!s)return;s.innerHTML=C().map(c=>`<option value="${c.id}" ${c.id===AV().catId?'selected':''}>${c.name}</option>`).join('');renderFolderSelect();}
function renderFolderSelect(){const cs=document.getElementById('new-task-cat'),fs=document.getElementById('new-task-folder');if(!cs||!fs)return;fs.innerHTML=`<option value="">— none —</option>`+F().filter(f=>f.catId===cs.value).map(f=>`<option value="${f.id}" ${f.id===AV().folderId?'selected':''}>${f.name}</option>`).join('');}

// ── TASK ACTIONS ──
function toggleTask(id){
  const t=T().find(t=>t.id===id);if(!t)return;
  const prev=countDone();t.done=!t.done;const next=countDone();
  if(t.done&&next>prev){recordCompletion();checkBadges();checkMilestones(prev,next);}
  sched();render();
}
function toggleExpand(id){const t=T().find(t=>t.id===id);if(t){t.expanded=!t.expanded;sched();render();}}
function toggleSub(tid,sid){const t=T().find(t=>t.id===tid);if(!t)return;const s=t.subtasks.find(s=>s.id===sid);if(s){s.done=!s.done;sched();render();}}
function deleteTask(id){window._tasks=T().filter(t=>t.id!==id);sched();render();}
function deleteSub(tid,sid){const t=T().find(t=>t.id===tid);if(t){t.subtasks=t.subtasks.filter(s=>s.id!==sid);sched();render();}}
function addSub(tid){const inp=document.getElementById('sub-'+tid);if(!inp||!inp.value.trim())return;const t=T().find(t=>t.id===tid);if(!t)return;t.subtasks.push({id:'s'+NI(),name:inp.value.trim(),done:false});inp.value='';sched();render();}
function updField(id,field,val){const t=T().find(t=>t.id===id);if(!t)return;t[field]=field.includes('Hours')?(val===''?'':parseFloat(val)):val;sched();render();}
function addTask(){
  const el=document.getElementById('new-task-name');
  const html=el.innerHTML.trim(),txt=el.innerText.trim();if(!txt)return;
  const catId=document.getElementById('new-task-cat').value;
  const folderId=document.getElementById('new-task-folder').value||null;
  const deadline=document.getElementById('new-task-deadline').value;
  const timeframe=document.getElementById('new-task-timeframe').value.trim();
  const est=document.getElementById('new-task-est').value;
  window._tasks.push({id:'t'+NI(),catId,folderId,nameHtml:html,done:false,deadline,timeframe,estHours:est?parseFloat(est):'',actualHours:'',expanded:false,subtasks:[],important:window._newImportant||false});
  el.innerHTML='';['new-task-deadline','new-task-timeframe','new-task-est'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  window._newImportant=false;const sb=document.getElementById('new-task-star');if(sb){sb.textContent='☆';sb.classList.remove('starred');}
  sched();render();
}

    window._sc=PALETTE[0];

  }else if(type==='folder'){
    window._sc=PALETTE[5];
    mc.innerHTML=`<div class="modal-title">New Folder</div><div class="modal-fields"><div class="form-group"><div class="form-label">Folder name</div><input class="form-input" id="m-name" placeholder="e.g. Website Redesign" style="width:100%"></div><div class="form-group"><div class="form-label">Under category</div><select class="form-select" id="m-cat" style="width:100%">${C().map(c=>`<option value="${c.id}" ${c.id===AV().catId?'selected':''}>${c.name}</option>`).join('')}</select></div><div class="form-group"><div class="form-label">Color</div><div class="color-grid">${PALETTE.map((c,i)=>`<div class="color-opt ${i===5?'selected':''}" style="background:${c}" data-c="${c}" onclick="pc(this,'${c}')"></div>`).join('')}</div></div></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="addFolder()">Create</button></div>`;
  }else if(type==='quick'){
    mc.innerHTML=`<div class="modal-title">Quick Add to General</div><div class="modal-fields"><div class="form-group"><div class="form-label">Task name</div><input class="form-input" id="m-name" placeholder="Task name" style="width:100%" onkeydown="if(event.key==='Enter')quickAdd()"></div><div class="form-group"><div class="form-label">Est. hours</div><input class="form-input" id="m-est" type="number" min="0" step="0.5" placeholder="0" style="width:90px"></div></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="quickAdd()">Add</button></div>`;
    setTimeout(()=>document.getElementById('m-name')?.focus(),50);
  }else if(type==='recategorize'){
    const t=T().find(t=>t.id===data);
    mc.innerHTML=`<div class="modal-title">Re-categorize</div><div style="color:var(--text2);font-size:13px;margin-bottom:12px;font-style:italic">${t?t.nameHtml:''}</div><div class="modal-fields"><div class="form-group"><div class="form-label">Move to category</div><select class="form-select" id="m-cat" style="width:100%" onchange="updFolderOpts()">${C().filter(c=>c.id!=='general').map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div><div class="form-group"><div class="form-label">Folder (optional)</div><select class="form-select" id="m-folder" style="width:100%"><option value="">— none —</option></select></div></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doRecat('${data}')">Move</button></div>`;
    updFolderOpts();
  }else if(type==='editCat'){
    const isF=data.type==='folder',item=isF?F().find(f=>f.id===data.id):C().find(c=>c.id===data.id);
    if(!item){closeModal();return;}window._sc=item.color;
    const isG=!isF&&item.id==='general';
    mc.innerHTML=`<div class="modal-title">Edit ${isF?'Folder':'Category'}</div><div class="modal-fields"><div class="form-group"><div class="form-label">Name</div><input class="form-input" id="m-name" value="${esc(item.name)}" style="width:100%" ${isG?'disabled':''}></div><div class="form-group"><div class="form-label">Color</div><div class="color-grid">${PALETTE.map(c=>`<div class="color-opt ${c===item.color?'selected':''}" style="background:${c}" data-c="${c}" onclick="pc(this,'${c}')"></div>`).join('')}</div></div></div><div class="modal-actions">${!isG?`<button class="btn btn-danger" onclick="delItem('${isF?'folder':'cat'}','${item.id}')">Delete</button>`:''}<div style="flex:1"></div><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveItem('${isF?'folder':'cat'}','${item.id}')">Save</button></div>`;
  }else if(type==='editTask'){
    const t=T().find(t=>t.id===data);if(!t){closeModal();return;}
    mc.innerHTML=`<div class="modal-title">Edit Task</div><div class="modal-fields"><div class="form-group"><div class="form-label">Name</div><input class="form-input" id="m-name" value="${escA(t.nameHtml||t.name||'')}" style="width:100%"></div><div class="form-group"><div class="form-label">Deadline</div><input class="form-input" id="m-deadline" type="datetime-local" value="${t.deadline||''}" style="width:100%"></div><div class="form-group"><div class="form-label">Timeframe</div><input class="form-input" id="m-timeframe" value="${esc(t.timeframe||'')}" placeholder="e.g. next month" style="width:100%"></div><div class="form-group"><div class="form-label">Category</div><select class="form-select" id="m-cat" style="width:100%" onchange="updFolderOpts()">${C().map(c=>`<option value="${c.id}" ${c.id===t.catId?'selected':''}>${c.name}</option>`).join('')}</select></div><div class="form-group"><div class="form-label">Folder</div><select class="form-select" id="m-folder" style="width:100%"><option value="">— none —</option>${F().filter(f=>f.catId===t.catId).map(f=>`<option value="${f.id}" ${f.id===t.folderId?'selected':''}>${f.name}</option>`).join('')}</select></div><div class="form-group"><label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer"><input type="checkbox" id="m-important" ${t.important?'checked':''} style="width:14px;height:14px"> ★ Mark as important</label></div></div><div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEditTask('${t.id}')">Save</button></div>`;
  }
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function pc(el,c){window._sc=c;document.querySelectorAll('.color-opt').forEach(d=>d.classList.toggle('selected',d.dataset.c===c));}
function addCat(){const n=document.getElementById('m-name')?.value.trim();if(!n)return;const id='cat'+NI();C().push({id,name:n,color:window._sc||PALETTE[0],open:true});closeModal();setAV({catId:id,folderId:null});sched();render();}
function addFolder(){const n=document.getElementById('m-name')?.value.trim(),catId=document.getElementById('m-cat')?.value;if(!n||!catId)return;const id='f'+NI();F().push({id,catId,name:n,color:window._sc||PALETTE[5]});const cat=C().find(c=>c.id===catId);if(cat)cat.open=true;closeModal();setAV({catId,folderId:id});sched();render();}
function quickAdd(){const n=document.getElementById('m-name')?.value.trim();if(!n)return;const est=document.getElementById('m-est')?.value;window._tasks.push({id:'t'+NI(),catId:'general',folderId:null,nameHtml:esc(n),done:false,deadline:'',timeframe:'',estHours:est?parseFloat(est):'',actualHours:'',expanded:false,subtasks:[],important:false});closeModal();setAV({catId:'general',folderId:null});sched();render();}
function updFolderOpts(){const cs=document.getElementById('m-cat'),fs=document.getElementById('m-folder');if(!cs||!fs)return;fs.innerHTML=`<option value="">— none —</option>`+F().filter(f=>f.catId===cs.value).map(f=>`<option value="${f.id}">${f.name}</option>`).join('');}
function openRecategorize(id){openModal('recategorize',id);}
function doRecat(id){const t=T().find(t=>t.id===id),cs=document.getElementById('m-cat'),fs=document.getElementById('m-folder');if(!t||!cs){closeModal();return;}t.catId=cs.value;t.folderId=fs?.value||null;closeModal();sched();render();}
function openEditCurrent(){AV().folderId?openModal('editCat',{type:'folder',id:AV().folderId}):openModal('editCat',{type:'cat',id:AV().catId});}
function saveItem(type,id){const n=document.getElementById('m-name')?.value.trim(),col=window._sc;if(type==='cat'){const c=C().find(c=>c.id===id);if(c){if(n)c.name=n;if(col)c.color=col;}}else{const f=F().find(f=>f.id===id);if(f){if(n)f.name=n;if(col)f.color=col;}}closeModal();sched();render();}
function delItem(type,id){if(!confirm(`Delete this ${type}? Tasks inside will not be deleted.`))return;if(type==='cat'){if(id==='general')return;T().forEach(t=>{if(t.catId===id)t.catId='general';});window._folders=F().filter(f=>f.catId!==id);window._categories=C().filter(c=>c.id!==id);setAV({catId:'general',folderId:null});}else{T().forEach(t=>{if(t.folderId===id)t.folderId=null;});window._folders=F().filter(f=>f.id!==id);setAV({catId:AV().catId,folderId:null});}closeModal();sched();render();}
function openEditTask(id){openModal('editTask',id);}
function saveEditTask(id){const t=T().find(t=>t.id===id);if(!t){closeModal();return;}const n=document.getElementById('m-name')?.value;if(n!==undefined)t.nameHtml=n;t.deadline=document.getElementById('m-deadline')?.value||'';t.timeframe=document.getElementById('m-timeframe')?.value.trim()||'';const catId=document.getElementById('m-cat')?.value,folderId=document.getElementById('m-folder')?.value||null;if(catId)t.catId=catId;t.folderId=folderId;t.important=document.getElementById('m-important')?.checked||false;closeModal();sched();render();}

// ── UTILS ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escA(s){return String(s||'').replace(/"/g,'&quot;');}
function fmtDL(d){const now=new Date(),diff=d-now,h=Math.abs(diff)/3600000;if(h<1)return diff<0?'overdue':'< 1h';if(h<24)return(diff<0?'-':'')+Math.round(h)+'h';const days=Math.round(h/24);return(diff<0?'-':'')+days+'d · '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}

// ── IMPORTANT ──
function toggleImportant(id){const t=T().find(t=>t.id===id);if(t){t.important=!t.important;sched();render();}}
function toggleNewImportant(){
  window._newImportant=!window._newImportant;
  const btn=document.getElementById('new-task-star');
  if(btn){btn.textContent=window._newImportant?'★':'☆';btn.classList.toggle('starred',window._newImportant);}
}

// ── BADGES & STREAKS ──
const BADGE_DEFS=[
  {id:'first_task', name:'First Step',     desc:'Complete 1 task',     emoji:'🌱'},
  {id:'tasks_10',  name:'Getting Going',   desc:'10 tasks done',       emoji:'⚡'},
  {id:'tasks_25',  name:'On a Roll',       desc:'25 tasks done',       emoji:'🔥'},
  {id:'tasks_50',  name:'Halfway Hero',    desc:'50 tasks done',       emoji:'💪'},
  {id:'tasks_100', name:'Centurion',       desc:'100 tasks done',      emoji:'🏆'},
  {id:'streak_3',  name:'Habit Forming',   desc:'3-day streak',        emoji:'📅'},
  {id:'streak_7',  name:'Week Warrior',    desc:'7-day streak',        emoji:'🗓️'},
  {id:'streak_14', name:'Fortnight Force', desc:'14-day streak',       emoji:'🌟'},
  {id:'streak_30', name:'Monthly Legend',  desc:'30-day streak',       emoji:'👑'},
];
const BADGE_THRESHOLDS={first_task:1,tasks_10:10,tasks_25:25,tasks_50:50,tasks_100:100,streak_3:3,streak_7:7,streak_14:14,streak_30:30};
function todayStr(){return new Date().toISOString().slice(0,10);}
function computeStreak(dates){
  if(!dates||!dates.length)return 0;
  const uniq=[...new Set(dates)].sort().reverse();
  const today=todayStr(),yest=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(uniq[0]!==today&&uniq[0]!==yest)return 0;
  let n=0,cur=uniq[0];
  for(const d of uniq){if(d===cur){n++;const dt=new Date(cur+'T12:00:00');dt.setDate(dt.getDate()-1);cur=dt.toISOString().slice(0,10);}else break;}
  return n;
}
function recordCompletion(){
  const p=window._progress;const today=todayStr();
  if(!p.completedDates.includes(today))p.completedDates.push(today);
  const s=computeStreak(p.completedDates);if(s>(p.longestStreak||0))p.longestStreak=s;
}
function checkBadges(){
  const done=countDone(),streak=computeStreak(window._progress.completedDates);
  const earned=window._progress.badges;let changed=false;
  BADGE_DEFS.forEach(b=>{
    if(earned.includes(b.id))return;
    const thr=BADGE_THRESHOLDS[b.id];
    const ok=b.id.startsWith('streak_')?streak>=thr:done>=thr;
    if(ok){earned.push(b.id);changed=true;}
  });
  if(changed)sched();
}

window.render=function(){renderSidebar();if(currentPanel==='tasks')renderMain();else renderRewards();}
// Don't call render() here — the Firebase module calls it after data loads
</script>
